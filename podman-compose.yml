services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    environment:
      POSTGRES_DB: unipush
      POSTGRES_USER: unipush
      POSTGRES_PASSWORD: unipush
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: docker.io/library/redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
