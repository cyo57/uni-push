services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: unipush
      POSTGRES_USER: unipush
      POSTGRES_PASSWORD: unipush
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unipush -d unipush"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: docker.io/library/redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/unipush.db
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:8000"]'
    depends_on:
      redis:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "uv run alembic upgrade head && uv run seed-admin && uv run unipush-api",
      ]
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/unipush.db
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:8000"]'
    depends_on:
      redis:
        condition: service_healthy
    command: ["uv", "run", "arq", "app.workers.arq.WorkerSettings"]
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
  postgres-data:
  redis-data:
